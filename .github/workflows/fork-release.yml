name: Fork Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Immutable image tag override (sha-<12 hex>, or vX.Y.Z only from matching tag ref)"
        required: false

env:
  REGISTRY: ghcr.io

# Release jobs can publish packages, but they do not receive production environment secrets.
permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Resolve Fork Release Contract
    runs-on: ubuntu-latest
    outputs:
      image_owner: ${{ steps.owner.outputs.image_owner }}
      image_tag: ${{ steps.contract.outputs.image_tag }}
      chart_version: ${{ steps.contract.outputs.chart_version }}
      semver_minor: ${{ steps.contract.outputs.semver_minor }}
      is_release_tag: ${{ steps.contract.outputs.is_release_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Normalize image owner
        id: owner
        run: |
          echo "image_owner=$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Resolve image tag and chart version
        id: contract
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
        run: bash deploy/scripts/release-contract.sh

  # ── Core service images ────────────────────────────────────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: Dockerfile.api
            context: .
          - service: web
            dockerfile: Dockerfile.web
            context: .
          - service: optio
            dockerfile: Dockerfile.optio
            context: .
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/optio-${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=raw,value=${{ needs.prepare.outputs.chart_version }},enable=${{ needs.prepare.outputs.is_release_tag == 'true' }}
            type=raw,value=${{ needs.prepare.outputs.semver_minor }},enable=${{ needs.prepare.outputs.semver_minor != '' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' && github.ref_name == 'develop' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Agent images ───────────────────────────────────────────────────────────
  build-agent-base:
    name: Build agent-base
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/optio-agent-base
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=raw,value=${{ needs.prepare.outputs.chart_version }},enable=${{ needs.prepare.outputs.is_release_tag == 'true' }}
            type=raw,value=${{ needs.prepare.outputs.semver_minor }},enable=${{ needs.prepare.outputs.semver_minor != '' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' && github.ref_name == 'develop' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: images/base.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent-base
          cache-to: type=gha,mode=max,scope=agent-base

  build-agent-presets:
    name: Build agent-${{ matrix.preset }}
    runs-on: ubuntu-latest
    needs: [prepare, build-agent-base]
    strategy:
      matrix:
        preset: [node, python, go, rust, full]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/optio-agent-${{ matrix.preset }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=raw,value=${{ needs.prepare.outputs.chart_version }},enable=${{ needs.prepare.outputs.is_release_tag == 'true' }}
            type=raw,value=${{ needs.prepare.outputs.semver_minor }},enable=${{ needs.prepare.outputs.semver_minor != '' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' && github.ref_name == 'develop' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: images/${{ matrix.preset }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}/optio-agent-base:${{ needs.prepare.outputs.image_tag }}
          cache-from: type=gha,scope=agent-${{ matrix.preset }}
          cache-to: type=gha,mode=max,scope=agent-${{ matrix.preset }}

  # ── Helm chart OCI artifact ────────────────────────────────────────────────
  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: [prepare, build-services, build-agent-presets]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ needs.prepare.outputs.chart_version }}/" helm/optio/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ needs.prepare.outputs.image_tag }}\"/" helm/optio/Chart.yaml

      - name: Package chart
        run: helm package helm/optio --destination .helm-pkg

      - name: Push chart to GHCR
        run: helm push .helm-pkg/optio-${{ needs.prepare.outputs.chart_version }}.tgz oci://${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_owner }}
